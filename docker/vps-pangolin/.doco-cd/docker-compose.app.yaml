---
# This file is not managed by doco-cd because it can't manage itself

secrets:
  1pw_token:
    file: /opt/doco-cd/1pw_token
  gh_token:
    file: /opt/doco-cd/gh_token
services:
  app:
    container_name: doco-cd
    environment:
      GIT_ACCESS_TOKEN_FILE: /run/secrets/gh_token
      LOG_LEVEL: info
      POLL_CONFIG: |-
        - url: https://github.com/home-ops/home-ops.git
          reference: refs/heads/main
          interval: 60
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token
      DEPLOY_CONFIG_BASE_DIR: ./docker/vps-pangolin/
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
    image: ghcr.io/kimdre/doco-cd:0.89.2@sha256:41a0de35597033d49326042de1e8e91e0ef48eefb445597ace1f82946d2009cd
    restart: unless-stopped
    secrets:
      - 1pw_token
      - gh_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
volumes:
  data: {}