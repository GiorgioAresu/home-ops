[env]
JUST_UNSTABLE = "1"
KUBECONFIG = '{{config_root}}/kubeconfig'
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = '{{config_root}}/talosconfig'

[hooks]
postinstall = "ansible-galaxy install -r {{config_root}}/ansible/requirements.yaml"

[plugins]
krew="https://github.com/soupglasses/mise-krew"

[settings]
pipx.uvx = true

[tools]
"aqua:astral-sh/uv" = "latest"
"aqua:google/yamlfmt" = "latest"
"aqua:mitsuhiko/minijinja" = "latest"
"aqua:rhysd/actionlint" = "latest"
"krew:cnpg"="latest"
"krew:browse-pvc"="latest"
"pipx:ansible-core" = "latest"
"pipx:flux-local" = "latest"
ansible = { version = "latest", pipx_args = "--include-deps", uvx = false }
flux2 = "latest"
gum = "latest"
just = "latest"
k9s = "latest"
kubectl = "latest"
pipx = "latest"
talosctl = "latest"
terraform = "latest"
"aqua:kubernetes-sigs/krew" = "latest"
