---
- name: Bootstrap OdroidHC4
  hosts: odroidhc4
  become: true
  gather_facts: false
  vars:
    ansible_user: root
    ansible_python_interpreter: auto_silent

  tasks:
    - name: Check host connectivity
      ansible.builtin.ping:

    - name: Read secrets from 1Password
      ansible.builtin.shell: "op read 'op://{{ item.key }}' < /dev/null"
      delegate_to: localhost
      become: false
      loop:
        - key: Services/xb22lp7tixjsiavdsz3q42fzze/credential
          var: doco_1pw_sa_token
        - key: automation/doco-cd/api_secret
          var: doco_api_secret
        - key: automation/doco-cd/webhook_secret
          var: doco_webhook_secret
      check_mode: false
      changed_when: false
      no_log: true
      register: secrets_raw

    - name: Set secret facts
      ansible.builtin.set_fact:
        doco_1pw_sa_token: "{{ secrets_raw.results[0].stdout }}"
        doco_api_secret: "{{ secrets_raw.results[1].stdout }}"
        doco_webhook_secret: "{{ secrets_raw.results[2].stdout }}"
      no_log: true

    - name: doco-cd
      vars:
        dococd_config_dir: /home/odroid/.config/doco-cd
      block:
        - name: doco-cd | Create directory
          ansible.builtin.file:
            path: "{{ dococd_config_dir }}"
            state: directory
            owner: odroid
            group: odroid
            mode: "0700"

        - name: doco-cd | Copy docker-compose app file
          ansible.builtin.copy:
            src: ../../docker/odroidhc4/.doco-cd/docker-compose.app.yaml
            dest: "{{ dococd_config_dir }}/docker-compose.yaml"
            owner: odroid
            group: odroid
            mode: "0644"
          register: compose_file

        - name: doco-cd | Create secrets
          ansible.builtin.copy:
            dest: "{{ dococd_config_dir }}/{{ item.name }}"
            content: |
              {{ item.content }}
            owner: odroid
            group: odroid
            mode: "0600"
          no_log: true
          loop:
            - name: 1pw_token
              content: "{{ doco_1pw_sa_token }}"
            - name: api_secret
              content: "{{ doco_api_secret }}"
            - name: webhook_secret
              content: "{{ doco_webhook_secret }}"

        - name: doco-cd | Run docker-compose
          community.docker.docker_compose_v2:
            project_src: "{{ dococd_config_dir }}"
            files:
              - docker-compose.yaml
            pull: always
            state: present
          when: not ansible_check_mode

        # - name: doco-cd | Wait for healthy
        #   community.docker.docker_container_info:
        #     name: doco-cd
        #   register: dococd_info
        #   until: dococd_info.container.State.Health.Status == "healthy"
        #   retries: 30
        #   delay: 10
        #   when: not ansible_check_mode
        # Replaced with the following due to python3.14 quirks
        - name: doco-cd | Wait for healthy
          ansible.builtin.command:
            cmd: docker inspect --format='{{"{{"}} .State.Health.Status {{"}}"}}' doco-cd
          register: health_status
          until: health_status.stdout == "healthy"
          retries: 30
          delay: 10
          changed_when: false
          when: not ansible_check_mode
