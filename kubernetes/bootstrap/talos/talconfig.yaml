# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.7.1
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.30.0

clusterName: &cluster home-kubernetes
endpoint: https://10.17.1.7:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"
additionalApiServerCertSans: &sans
  - "10.17.1.7"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans
cniConfig:
  name: none

nodes:
  - hostname: "kube-proxmox-01"
    ipAddress: "10.17.1.32"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/88d1f7a5c4f1d3aba7df787c448c1d3d008ed29cfb34af53fa0df4336a56040b
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:41:5f:39"
        dhcp: false
        addresses:
          - "10.17.1.32/24"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "10.17.1.1"
        vip:
          ip: "10.17.1.7"
    patches:
      - &longhorn_sdb |-
        machine:
          disks:
          - device: /dev/sdb
            partitions:
              - mountpoint: /var/lib/longhorn

  - hostname: "kube-proxmox-02"
    ipAddress: "10.17.1.33"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/88d1f7a5c4f1d3aba7df787c448c1d3d008ed29cfb34af53fa0df4336a56040b
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:ef:8f:39"
        dhcp: false
        addresses:
          - "10.17.1.33/24"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "10.17.1.1"
    patches:
      - *longhorn_sdb

  - hostname: "kube-proxmox-03"
    ipAddress: "10.17.1.37"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/88d1f7a5c4f1d3aba7df787c448c1d3d008ed29cfb34af53fa0df4336a56040b
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:90:da:27"
        dhcp: false
        addresses:
          - "10.17.1.37/24"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "10.17.1.1"
    patches:
      - *longhorn_sdb

  - hostname: "kube-rpi4-01"
    ipAddress: "10.17.1.34"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e4:5f:01:48:d7:4e"
        dhcp: false
        addresses:
          - "10.17.1.34/24"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "10.17.1.1"
        vip:
          ip: "10.17.1.7"
    patches:
      - &longhorn_mmcblk0 |-
        machine:
          disks:
          - device: /dev/mmcblk0
            partitions:
              - mountpoint: /var/lib/longhorn

  - hostname: "kube-rpi4-02"
    ipAddress: "10.17.1.35"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/f8a903f101ce10f686476024898734bb6b36353cc4d41f348514db9004ec0a9d
    controlPlane: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e4:5f:01:96:b3:71"
        dhcp: false
        addresses:
          - "10.17.1.35/24"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "10.17.1.1"
    patches:
      - *longhorn_mmcblk0

  - hostname: "kube-nuc-01"
    ipAddress: "10.17.1.36"
    installDiskSelector:
      size: "<= 128GB"
      model: "USB3.0*"
    talosImageURL: factory.talos.dev/installer/b0f625a97dda4d776607a73ab2443418f55922f738948ae728d7d29a8687a21c
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "68:5b:35:a1:01:ca"
        dhcp: false
        addresses:
          - "10.17.1.36/24"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "10.17.1.1"
        vip:
          ip: "10.17.1.7"

patches:
  # Configure containerd
  - |-
    machine:
      files:
        - op: create
          path: /etc/cri/conf.d/20-customization.part
          content: |-
            [plugins."io.containerd.grpc.v1.cri"]
              enable_unprivileged_ports = true
              enable_unprivileged_icmp = true
            [plugins."io.containerd.grpc.v1.cri".containerd]
              discard_unpacked_layers = false
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              discard_unpacked_layers = false

  # Disable search domain everywhere
  - |-
    machine:
      network:
        disableSearchDomain: true

  # Enable cluster discovery
  - |-
    cluster:
      discovery:
        registries:
          kubernetes:
            disabled: false
          service:
            disabled: false

  # Configure kubelet
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: true
        nodeIP:
          validSubnets: ["10.17.1.0/24"]

  # Force nameserver
  - |-
    machine:
      network:
        nameservers:
          - 10.17.1.1

  # Configure NTP
  - |-
    machine:
      time:
        disabled: false
        servers: ["10.17.1.1"]

  # Custom sysctl settings
  - |-
    machine:
      sysctls:
        fs.inotify.max_queued_events: "65536"
        fs.inotify.max_user_watches: "524288"
        fs.inotify.max_user_instances: "8192"
        net.core.rmem_max: "2500000"
        net.core.wmem_max: "2500000"

  # Mount openebs-hostpath in kubelet
  - |-
    machine:
      kubelet:
        extraMounts:
          - destination: /var/openebs/local
            type: bind
            source: /var/openebs/local
            options: ["bind", "rshared", "rw"]

  # Mount longhorn in kubelet
  - |-
    machine:
      kubelet:
        extraMounts:
          - destination: /var/lib/longhorn
            type: bind
            source: /var/lib/longhorn
            options: ["bind", "rshared", "rw"]
      sysctls:
        vm.nr_hugepages: "1024"


controlPlane:
  patches:
    # Cluster configuration
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

    # ETCD configuration
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
          advertisedSubnets:
            - "10.17.1.0/24"

    # Disable default API server admission plugins.
    - |-
      - op: remove
        path: /cluster/apiServer/admissionControl

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles: ["os:admin"]
            allowedKubernetesNamespaces: ["system-upgrade"]


