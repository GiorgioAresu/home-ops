---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: kopia-daily-maintenance
  namespace: volsync
spec:
  enabled: true
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/tank/backups/volsync
          server: truenas.aresu.eu
  repository:
    repository: volsync-secret
  trigger:
    schedule: "30 3,15 * * *"
