---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: transmission
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      transmission:
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/transmission
              tag: 4.0.4
            env:
              TZ: "${TIMEZONE}"
              PUID: 568
              PGID: 1003
              PEERPORT: 51413
            probes:
              liveness: &probes
                spec:
                  timeoutSeconds: 2
              readiness: *probes
              startup: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 15m
                memory: 50Mi
              limits:
                # cpu: 500m
                memory: 0.5Gi
        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
    # initContainers:
    #   custom-webui:
    #     name: custom-webui
    #     image: curlimages/curl:8.00.1
    #     command:
    #       - "/bin/sh"
    #       - "-c"
    #       - "curl -o- -sL https://github.com/johman10/flood-for-transmission/releases/download/latest/flood-for-transmission.tar.gz | tar xzf - -C /config"
    #     volumeMounts:
    #       - name: config
    #         mountPath: /config
    #     securityContext:
    #       runAsUser: 568
    #       runAsGroup: 568
    service:
      app:
        controller: transmission
        ports:
          http:
            port: 9091
          utp-tcp:
            enabled: true
            port: 51413
            protocol: TCP
          utp-udp:
            enabled: true
            port: 51413
            protocol: UDP
    ingress:
      app:
        className: internal
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
          hajimari.io/enable: "true"
          hajimari.io/group: "media"
          hajimari.io/icon: "cloud-download"
        hosts:
          - host: &host "transmission.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: transmission-tls
