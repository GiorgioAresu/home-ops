---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: intel-device-plugin-gpu
      namespace: kube-system
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/plex
              tag: 1.40.2.8395-c67dce28e@sha256:a2a3149c1326e7777bfe9def135c687d884652f78d34e92264b0dab765908215
            env:
              TZ: ${TIMEZONE}
              PLEX_ADVERTISE_URL: https://{{ .Release.Name }}.${SECRET_DOMAIN}:443,http://10.17.1.199:32400
              PLEX_NO_AUTH_NETWORKS: "${NODE_CIDR}"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                # gpu.intel.com/i915: 1
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        # Hardware acceleration using an Intel iGPU w/ QuickSync
        # These IDs below should be matched to your `video` and `render` group on the host
        # To obtain those IDs run the following grep statement on the host:
        # $ cat /etc/group | grep "video\|render"
        # video:x:44:
        # render:x:109:
        supplementalGroups: [44, 109, 1003]
        seccompProfile: { type: RuntimeDefault }
      # nodeSelector:
      #   intel.feature.node.kubernetes.io/gpu: "true"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 2
              preference:
                matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: In
                    values:
                      - "true"
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
    service:
      app:
        controller: plex
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 10.17.1.199
        ports:
          http:
            port: 32400
            protocol: HTTP
          dlna:
            port: 1900
            protocol: UDP
          gdm-discovery-1:
            port: 32410
            protocol: UDP
          gdm-discovery-2:
            port: 32412
            protocol: UDP
          gdm-discovery-3:
            port: 32413
            protocol: UDP
          gdm-discovery-4:
            port: 32414
            protocol: UDP
          dlna-plex:
            port: 32469
            protocol: TCP
    ingress:
      app:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
          # nginx.ingress.kubernetes.io/app-root: "/web" # Redirect / -> /web
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        labels:
          # nginx.ingress.kubernetes.io/validation: "skip" # Custom label to skip duplicate host/path validation (split horizon dns)
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      # config:
      #   enabled: true
      #   type: persistentVolumeClaim
      #   existingClaim: plex-config-v1
      #   globalMounts:
      #     - path: /config
      # Separate PVC for cache to avoid backing up cache files
      config:
        type: emptyDir
      # cache:
      #   existingClaim: plex-cache
      #   globalMounts:
      #     - path: /config/Library/Application Support/Plex Media Server/Cache
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      tmp:
        type: emptyDir
      transcode:
        type: emptyDir
      media:
        type: nfs
        server: "${TRUENAS_ADDR}"
        path: /mnt/tank/media
        globalMounts:
          - path: /media
            readOnly: true
