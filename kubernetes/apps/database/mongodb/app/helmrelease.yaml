---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb
spec:
  interval: 30m
  chart:
    spec:
      chart: mongodb
      version: 15.4.3
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    strategy:
      type: Recreate
    architecture: standalone
    useStatefulSet: true
    clusterDomain: "${SECRET_DOMAIN}"
    auth:
      rootUser: root
      rootPassword: "${SECRET_MONGODB_PASSWORD}"
    persistence:
      enabled: true
      existingClaim: mongodb-primary-v1
    service:
      type: LoadBalancer
      loadBalancerIP: "${SVC_MONGODB_ADDR}"
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "{{ .Release.Name }}.${SECRET_DOMAIN}"
      externalTrafficPolicy: Cluster
    diagnosticMode: # All probes will be disabled and the command will be overridden with sleep infinity
      enabled: false
    backup:
      enabled: true
      cronjob:
        schedule: "@daily"
        storage:
          existingClaim: mongodb-backups-v1
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 1m
    resources:
      requests:
        memory: 100Mi
        cpu: 10m
      # limits:
      #   memory: 100Mi
      #   cpu: 100m
    nodeSelector:
      kubernetes.io/arch: amd64
