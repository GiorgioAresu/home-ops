---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.6.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
    defaultSettings:
      backupTarget: nfs://${TRUENAS_ADDR}:/mnt/tank/longhorn-backups
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
      concurrentReplicaRebuildPerNodeLimit: 2
      createDefaultDiskLabeledNodes: false
      defaultLonghornStaticStorageClass: longhorn
      defaultReplicaCount: 1
      # guaranteedEngineManagerCPU: 20
      # guaranteedReplicaManagerCPU: 20
      node-drain-policy: allow-if-replica-is-stopped
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      orphanAutoDeletion: true
      restoreVolumeRecurringJobs: true
      storageMinimalAvailablePercentage: 10
      # storageOverProvisioningPercentage: 100
    annotations:
      configmap.reloader.stakater.com/reload: longhorn-default-setting
    ingress:
      enabled: true
      ingressClassName: internal
      annotations:
        hajimari.io/appName: "longhorn"
        hajimari.io/enable: "true"
        hajimari.io/group: "admin"
        hajimari.io/icon: "harddisk"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        # prevent the controller from redirecting (308) to HTTPS
        nginx.ingress.kubernetes.io/ssl-redirect: 'false'
        # custom max body size for file uploading like backing image uploading
        nginx.ingress.kubernetes.io/proxy-body-size: 10000m
      host: "longhorn.${SECRET_DOMAIN}"
      path: /
      tls: true
    persistence:
      defaultClassReplicaCount: 1
      reclaimPolicy: Delete
    metrics:
      serviceMonitor:
        enabled: true
