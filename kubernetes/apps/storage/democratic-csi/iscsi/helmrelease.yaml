---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: democratic-csi-iscsi
spec:
  interval: 30m
  chart:
    spec:
      chart: democratic-csi
      version: 0.14.6
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controller:
      driver:
        image: docker.io/democraticcsi/democratic-csi:v1.9.0
    csiDriver:
      name: "org.democratic-csi.iscsi"
    storageClasses:
      - name: truenas-iscsi-csi
        defaultClass: false
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          fsType: ext4
          detachedVolumesFromSnapshots: false
        mountOptions: []
        secrets:
          provisioner-secret: {}
          controller-publish-secret: {}
          node-stage-secret: {}
          node-publish-secret: {}
          controller-expand-secret: {}
    volumeSnapshotClasses:
    - name: iscsi
      parameters:
        detachedSnapshots: "true"
    driver:
      config:
        driver: freenas-api-iscsi
        httpConnection:
          protocol: https
          host: "truenas.${SECRET_DOMAIN}"
          port: 443
          apiKey: "${SECRET_TRUENAS_API_KEY}"
        zfs:
          datasetParentName: tank/k8s/iscsi/v
          detachedSnapshotsDatasetParentName: tank/k8s/iscsi/s
          zvolCompression:
          zvolDedup:
          zvolEnableReservation: false
          zvolBlocksize:
        iscsi:
          targetPortal: "truenas.${SECRET_DOMAIN}:3260"
          targetPortals: []
          interface:
          namePrefix: csi-
          nameSuffix: "-clustera"
          targetGroups:
            - targetGroupPortalGroup: 1
              targetGroupInitiatorGroup: 1
              targetGroupAuthType: None
              targetGroupAuthGroup:
          extentInsecureTpc: true
          extentXenCompat: false
          extentDisablePhysicalBlocksize: true
          extentBlocksize: 512
          extentRpm: "" # Let truenas decide
          extentAvailThreshold: 0
