---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: unifi-controller
spec:
  interval: 30m0s
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      unifi:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/unifi-network-application # TODO: Switch to jacobalberty/unifi-docker for multiarch support
              tag: 8.1.127@sha256:8f333c2a2a163cc8881f1f6413b3f77fc85e5644036fb2c08383f99e5a1c7de0
            env:
              TZ: "${TIMEZONE}"
              PUID: 1000
              PGID: 1000
              MEM_LIMIT: "250"
            envFrom:
              - secretRef:
                  name: unifi-controller-secret
            resources:
              requests:
                cpu: 475m
                memory: 978M
              limits:
                cpu: 796m
                memory: 1243M
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/arch: amd64
    service:
      app:
        controller: unifi
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: ${SVC_UNIFIDIRECT_ADDR}
        ports:
          http:
            port: 8443
            protocol: HTTPS
          controller:
            port: 8080
            protocol: TCP
          portal-http:
            port: 8880
            protocol: HTTP
          portal-https:
            port: 8843
            protocol: HTTPS
          speedtest:
            port: 6789
            protocol: TCP
          syslog:
            port: 5514
            protocol: UDP
          stun:
            port: 3478
            protocol: UDP
          l2-discovery:
            port: 1900
            protocol: UDP
          device-discovery:
            port: 10001
            protocol: UDP
    ingress:
      app:
        className: internal
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/group: "admin"
          hajimari.io/icon: "wifi"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    # portal:
    #   className: internal
    #   annotations:
    #     nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    #     hosts:
    #       - host: &host-guest "guest.${SECRET_DOMAIN}"
    #         paths:
    #           - path: /
    #             pathType: Prefix
    #             service:
    #               port: guest-https
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: unifi-config-v1
        globalMounts:
          - path: /config
