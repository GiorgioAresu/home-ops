---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unifi-controller
spec:
  interval: 30m0s
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      unifi:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/unifi-network-application # TODO: Switch to jacobalberty/unifi-docker for multiarch support
              tag: 8.2.93@sha256:0bfad0096c4508fad5b7934142abcad12d9f79a339cad86ea70789119bd03ad6
            env:
              TZ: "${TIMEZONE}"
              PUID: 1000
              PGID: 1000
              MEM_LIMIT: "250"
            envFrom:
              - secretRef:
                  name: unifi-controller-secret
            resources:
              requests:
                cpu: 475m
                memory: 978M
              limits:
                cpu: 796m
                memory: 1243M
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/arch: amd64
    service:
      app:
        controller: unifi
        ports:
          http:
            port: 8443
            protocol: HTTPS
          portal-http:
            port: 8880
            protocol: HTTP
          portal-https:
            port: 8843
            protocol: HTTPS
      controller:
        controller: unifi
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "unifi.${SECRET_DOMAIN}"
          io.cilium/lb-ipam-ips: ${SVC_UNIFIDIRECT_ADDR}
        ports:
          controller:
            port: 8080
            protocol: TCP
          speedtest:
            port: 6789
            protocol: TCP
          syslog:
            port: 5514
            protocol: UDP
          stun:
            port: 3478
            protocol: UDP
          l2-discovery:
            # Doesn't really work due to cilium not handling brodcast addresses, see private docs
            port: 1900
            protocol: UDP
          device-discovery:
            # Doesn't really work due to cilium not handling brodcast addresses, see private docs
            port: 10001
            protocol: UDP
    ingress:
      app:
        className: internal
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/group: "admin"
          hajimari.io/icon: "wifi"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
          - host: "hotspot.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: portal-https
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: unifi-config-v1
        globalMounts:
          - path: /config
