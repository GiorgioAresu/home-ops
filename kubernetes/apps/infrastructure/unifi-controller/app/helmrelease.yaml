---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: unifi-controller
spec:
  interval: 30m0s
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      unifi:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: jacobalberty/unifi
              tag: v8.1.113@sha256:483b7f294845c9e32eeb84ad2cda20ff90e996bcb6fa3107cba35ef36e578fb6
            env:
              TZ: "${TIMEZONE}"
              RUNAS_UID0: "false"
              UNIFI_UID: "1000"
              UNIFI_GID: "1000"
              UNIFI_STDOUT: "true"
              JVM_INIT_HEAP_SIZE:
              JVM_MAX_HEAP_SIZE: 512M
            envFrom:
              - secretRef:
                  name: unifi-controller-secret
            resources:
              requests:
                cpu: 475m
                memory: 978M
              limits:
                cpu: 796m
                memory: 1243M
    service:
      app:
        controller: unifi
        ports:
          http:
            port: 8443
            protocol: HTTPS
          portal-http:
            port: 8880
            protocol: HTTP
          portal-https:
            port: 8843
            protocol: HTTPS
      controller:
        controller: unifi
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "unifi.${SECRET_DOMAIN}"
          io.cilium/lb-ipam-ips: ${SVC_UNIFIDIRECT_ADDR}
        ports:
          controller:
            port: 8080
            protocol: TCP
          speedtest:
            port: 6789
            protocol: TCP
          syslog:
            port: 5514
            protocol: UDP
          stun:
            port: 3478
            protocol: UDP
          l2-discovery:
            # Doesn't really work due to cilium not handling brodcast addresses, see private docs
            port: 1900
            protocol: UDP
          device-discovery:
            # Doesn't really work due to cilium not handling brodcast addresses, see private docs
            port: 10001
            protocol: UDP
    ingress:
      app:
        className: internal
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/group: "admin"
          hajimari.io/icon: "wifi"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
          - host: "hotspot.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: portal-https
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: unifi-config-v1
        globalMounts:
          - path: /unifi
