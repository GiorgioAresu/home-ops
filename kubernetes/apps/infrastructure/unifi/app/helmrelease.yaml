---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: unifi
spec:
  interval: 30m0s
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      unifi:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/unifi-network-application
              tag: 8.1.127@sha256:93e1fd80545657674bb77ccc315f7d024f093f7d2e942e36f49d695cccf8d183
            env:
              TZ: "${TIMEZONE}"
              PUID: 1000
              PGID: 1000
              MEM_LIMIT: "250"
            envFrom:
              - secretRef:
                  name: unifi-mongo
            resources:
              requests:
                cpu: 475m
                memory: 978M
              limits:
                cpu: 796m
                memory: 1243M
    service:
      app:
        controller: unifi
        ports:
          http:
            port: 8443
            protocol: HTTPS
          guest-http:
            enabled: false
            port: 8880
            protocol: HTTP
          guest-https:
            enabled: false
            port: 8843
            protocol: HTTPS
          device-comms:
            port: 8080
            protocol: TCP
          mobile-test:
            port: 6789
            protocol: TCP
          syslog:
            port: 5514
            protocol: TCP
          stun:
            port: 3478
            protocol: UDP
          l2-discovery:
            port: 1900
            protocol: UDP
          ap-discovery:
            port: 10001
            protocol: UDP
      direct:
        controller: unifi
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: ${SVC_UNIFIDIRECT_ADDR}
        ports:
          device-comms:
            enabled: true
            port: 8080
            protocol: TCP
          discovery:
            enabled: true
            port: 1900
            protocol: UDP
          ap-discovery:
            enabled: true
            port: 10001
            protocol: UDP
    ingress:
      app:
        className: internal
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/group: "admin"
          hajimari.io/icon: "wifi"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    # portal:
    #   className: internal
    #   annotations:
    #     nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    #     hosts:
    #       - host: &host-guest "guest.${SECRET_DOMAIN}"
    #         paths:
    #           - path: /
    #             pathType: Prefix
    #             service:
    #               port: guest-https
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: unifi-config-v1
        globalMounts:
          - path: /config
