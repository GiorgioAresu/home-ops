---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: apc-ups-device
spec:
  rules:
    - # APC UPS SMT1000RMI2U
      name: apc.ups
      labels:
        apc.feature.node.kubernetes.io/ups: "true"
      matchFeatures:
        - feature: usb.device
          matchExpressions:
            class: { op: In, value: ["03"] }
            vendor: { op: In, value: ["051d"] }
            device: { op: In, value: ["0003"] }
