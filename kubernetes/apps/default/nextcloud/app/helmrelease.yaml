  #     failedJobsHistoryLimit: 1
  #     successfulJobsHistoryLimit: 1
    nextcloud:
  #     datadir: /var/www/data
  #     extraEnv: *redisEnvs
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
      host: "nextcloud.${SECRET_DOMAIN}"
